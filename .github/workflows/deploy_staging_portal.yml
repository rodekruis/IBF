# See: https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions

name: 'Deploy [staging] Portal'

env:
  workingDirectory: portal/nrw-standalone

permissions:
  contents: read
  actions: read
  deployments: write
  id-token: write

on:
  workflow_call:
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      APP_MAPBOX_ACCESS_TOKEN:
        required: true
      FONTAWESOME_NPM_AUTH_TOKEN:
        required: true
  workflow_dispatch:

jobs:
  build_and_deploy:
    name: Build and Deploy Job
    runs-on: ubuntu-latest
    environment: 'staging'
    env:
      APP_IBF_API_BACKEND: ${{ vars.APP_NRW_API_BACKEND }}
      APP_SEED_DATA_REPO: ${{ vars.APP_SEED_DATA_REPO }}
      APP_MAPBOX_ACCESS_TOKEN: ${{ secrets.APP_MAPBOX_ACCESS_TOKEN }}
      FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Build Frontend
        id: build
        uses: ./.github/actions/build-frontend
        with:
          frontendPath: ${{ env.workingDirectory }}

      - name: Get API key for Azure Static Web App
        id: get-api-key
        uses: ./.github/actions/get-swa-api-key
        with:
          azureClientId: ${{ secrets.AZURE_CLIENT_ID }}
          azureTenantId: ${{ secrets.AZURE_TENANT_ID }}
          azureSubscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          staticWebAppName: nrw-portal-staging

      # More information on Static Web App workflow configurations,
      # See: https://aka.ms/swaworkflowconfig
      - name: Deploy to Azure Static Web App
        id: deploy_to_aswa
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.get-api-key.outputs.API_KEY }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          config_file_location: '${{ env.workingDirectory }}/dist'
          app_location: '${{ env.workingDirectory }}/dist'
          output_location: ''
          skip_app_build: true
          skip_api_build: true

      - name: Finish
        run: |
          echo "Build version: ${{ steps.build.outputs.build_version }}" >> $GITHUB_STEP_SUMMARY
          echo "Preview: <${{ steps.deploy_to_aswa.outputs.static_web_app_url }}>" >> $GITHUB_STEP_SUMMARY
