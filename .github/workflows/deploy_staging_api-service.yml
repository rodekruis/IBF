# See: https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions

name: 'Deploy [staging] api-service'

env:
  AZURE_WEBAPP_NAME: 'nrw-staging'
  AZURE_WEBAPP_PACKAGE_PATH: services/api-service

defaults:
  run:
    working-directory: services/api-service

permissions:
  contents: read
  actions: read
  deployments: write
  id-token: write

on:
  workflow_call:
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy
    environment: 'staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Build Service
        id: build
        uses: ./.github/actions/build-service
        with:
          servicePath: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
          databaseUrl: ${{ secrets.DATABASE_URL }}

      - name: 'Azure Login: 510 - Anticipatory Action'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        # Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
        # Also, see: https://github.com/Azure/actions-workflow-samples
        id: deploy_to_aas
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: '${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/artifact.zip'
          type: zip
          clean: true

      - name: Finish
        run: |
          echo "Build version: ${{ steps.build.outputs.build_version }}" >> $GITHUB_STEP_SUMMARY
          echo "Preview: <${{ steps.deploy_to_aas.outputs.webapp-url }}>" >> $GITHUB_STEP_SUMMARY
