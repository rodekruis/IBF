# Can't use the top-level "paths" filter because of issues with required checks
# See: https://github.com/orgs/community/discussions/44490#discussioncomment-10253645

name: Pipeline API integration tests

on:
  workflow_dispatch:
  merge_group:
    types: [checks_requested]
  pull_request:
  push:
    branches:
      - main
    paths:
      - 'data/**'
      - '!data/data_management/**'
      - 'services/api-service/**'
      - '.github/workflows/test_pipelines_api.yml'

permissions:
  contents: read
  id-token: write

jobs:
  path-filter:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.filter.outputs.should_skip }}
    steps:
      - uses: actions/checkout@v6
        # Other events (from the merge-queue) can safely ignore the path-filter; Its output would default to 'NOT true'
        if: github.event_name == 'pull_request'
        with:
          filter: blob:none
          fetch-depth: 0

      - uses: leavesster/pull-request-path-filter@v0.2
        # Other events (from the merge-queue) can safely ignore the path-filter; Its output would default to 'NOT true'
        if: github.event_name == 'pull_request'
        id: 'filter'
        with:
          paths: |
            - data/**
            - '!data/data_management/**'
            - services/api-service/**
            - .github/workflows/test_pipelines_api.yml

  test:
    runs-on: ubuntu-latest
    needs: path-filter
    if: ${{ needs.path-filter.outputs.should_skip != 'true' }}
    strategy:
      fail-fast: false
      matrix:
        test_node:
          - pipelines/test/integration_api/test_flood_pipeline_api.py
          - pipelines/test/integration_api/test_drought_pipeline_api.py
    defaults:
      run:
        working-directory: data
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: ./uv-sync.sh

      - name: Prepare environment
        run: cp .env.example .env

      - name: Prepare API service
        working-directory: .
        run: cp ./services/.env.example services/.env

      - name: Start API service
        working-directory: .
        run: npm run start:services:ci

      - name: Run test shard
        env:
          PYTHONFAULTHANDLER: '1'
          PYTHONUNBUFFERED: '1'
        run: uv run -m pytest "${{ matrix.test_node }}"

      - name: Docker logs
        if: failure()
        uses: jwalton/gh-docker-logs@v2

  # This job makes the matrix shards reportable as a single required status check.
  # See: https://github.com/orgs/community/discussions/44490
  test-shard-resolution-pipelines-api:
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Check required job results
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "Some checks have failed." >> $GITHUB_STEP_SUMMARY
          exit 1
      - name: Check required job results
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        run: |
          echo "All required checks have successfully passed." >> $GITHUB_STEP_SUMMARY
          exit 0
