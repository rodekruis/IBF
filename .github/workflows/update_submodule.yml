name: 'Update go-web-app submodule'

on:
  repository_dispatch:
    types: [submodule-update]
  workflow_dispatch:

permissions: {}

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.NRW_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.NRW_AUTOMATION_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Update submodule to latest ibf-main
        run: |
          git submodule update --init --remote portal/nrw-standalone/src/go-web-app

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet portal/nrw-standalone/src/go-web-app; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up pnpm
        if: steps.check.outputs.changed == 'true'
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Set up Node.js
        if: steps.check.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: portal/nrw-standalone/.node-version

      - name: Update lockfile
        if: steps.check.outputs.changed == 'true'
        working-directory: portal/nrw-standalone
        run: pnpm install --no-frozen-lockfile

      - name: Get submodule commit info
        if: steps.check.outputs.changed == 'true'
        id: info
        run: |
          cd portal/nrw-standalone/src/go-web-app
          SHA=$(git rev-parse --short HEAD)
          SUBJECT=$(git log -1 --format='%s')
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "subject=$SUBJECT" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: 'chore: update go-web-app submodule to ${{ steps.info.outputs.sha }}'
          branch: automated/update-go-web-app-submodule-${{ steps.info.outputs.sha }}
          title: 'chore: update go-web-app submodule — ${{ steps.info.outputs.subject }}'
          body: |
            Automated submodule update triggered by a merge to `ibf-main` in rodekruis/go-web-app.

            **Source PR:** ${{ github.event.client_payload.pr_url || 'N/A (manual trigger)' }}

            ## Checklist after merging

            - [ ] Copy over any changes in `sample.env` to `portal/nrw-standalone/sample.env` and to GitHub secrets if applicable.
            - [ ] Update dependencies in `portal/nrw-standalone/package.json` if the submodule introduced new imports.
            - [ ] Create/update any other `portal/nrw-standalone` code if applicable.

            ## Portal preview-deployment

            <!-- start deployment url -->

            This PR does not have any preview deployments yet.

            <!-- end deployment url -->
          labels: chore
          add-paths: |
            portal/nrw-standalone/src/go-web-app
            portal/nrw-standalone/pnpm-lock.yaml
