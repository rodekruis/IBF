name: Pipeline tests

on:
  workflow_dispatch:
  merge_group:
    types: [checks_requested]
  pull_request:
    paths:
      - 'data/**'
      - '!data/data_management/**'
      - '.github/workflows/test_pipelines.yml'
  push:
    branches:
      - main
    paths:
      - 'data/**'
      - '!data/data_management/**'
      - '.github/workflows/test_pipelines.yml'

# This is needed for qlty to authenticate with OIDC
# https://docs.qlty.sh/coverage/quickstart#github-actions
permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test_node:
          - pipelines/test/unit/
          - pipelines/test/integration/test_flood_pipeline.py
          - pipelines/test/integration/test_drought_pipeline.py
          - pipelines/test/legacy/test_pipeline_integration.py::test_pipeline_riverflood_ken
          - pipelines/test/legacy/test_pipeline_integration.py::test_pipeline_drought_eth
    defaults:
      run:
        working-directory: data
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: ./uv-sync.sh

      - name: Prepare environment
        run: cp .env.example .env

      - name: Run test shard
        env:
          BLOB_ACCOUNT_KEY: ${{ secrets.PIPELINES_BLOB_ACCOUNT_KEY }}
          COSMOS_KEY: ${{ secrets.PIPELINES_COSMOS_KEY }}
          CDSAPI_KEY: ${{ secrets.PIPELINES_CDSAPI_KEY }}
          PYTHONFAULTHANDLER: '1'
          PYTHONUNBUFFERED: '1'
        run: uv run -m pytest "${{ matrix.test_node }}"

  # This job is here to make the above jobs "required" in GitHub.
  # This is a workaround for this issue: https://github.com/orgs/community/discussions/44490
  test-shard-resolution-pipelines:
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Check required job results
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "Some checks have failed." >> $GITHUB_STEP_SUMMARY
          exit 1
      - name: Check required job results
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        run: |
          echo "All required checks have successfully passed." >> $GITHUB_STEP_SUMMARY
          exit 0
