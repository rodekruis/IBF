# Can't use the top-level "paths" filter because of issues with required checks
# See: https://github.com/orgs/community/discussions/44490#discussioncomment-10253645

name: Pipeline tests

on:
  workflow_dispatch:
  merge_group:
    types: [checks_requested]
  pull_request:
  push:
    branches:
      - main
    paths:
      - 'data/**'
      - '!data/data_management/**'
      - 'services/api-service/**'
      - '.github/workflows/test_pipelines.yml'

# This is needed for qlty to authenticate with OIDC
# https://docs.qlty.sh/coverage/quickstart#github-actions
permissions:
  contents: read
  id-token: write

jobs:
  path-filter:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.filter.outputs.should_skip }}
    steps:
      - uses: actions/checkout@v7
        # Other events (from the merge-queue) can safely ignore the path-filter; Its output would default to 'NOT true'
        if: github.event_name == 'pull_request'
        with:
          filter: blob:none
          fetch-depth: 0

      - uses: leavesster/pull-request-path-filter@v0.2
        # Other events (from the merge-queue) can safely ignore the path-filter; Its output would default to 'NOT true'
        if: github.event_name == 'pull_request'
        id: 'filter'
        with:
          paths: |
            - data/**
            - '!data/data_management/**'
            - services/api-service/**
            - .github/workflows/test_pipelines.yml

  test:
    runs-on: ubuntu-latest
    needs: path-filter
    if: ${{ needs.path-filter.outputs.should_skip != 'true' }}
    strategy:
      fail-fast: false
    defaults:
      run:
        working-directory: data
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set apt cache permissions
        run: sudo chown -R "$(id -u)" /var/cache/apt/archives

      - name: Cache apt packages
        uses: actions/cache@v6
        with:
          path: /var/cache/apt/archives
          key: apt-gdal

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev
          sudo chown -R "$(id -u)" /var/cache/apt/archives

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: ./uv-sync.sh

      - name: Prepare environment
        run: cp .env.example .env

      - name: Prepare API service
        working-directory: .
        run: cp ./services/.env.example services/.env

      - name: Start API service
        working-directory: .
        run: npm run start:services:ci

      - name: Reset database to UGA for tests
        run: |
          curl --fail --silent --show-error \
            --request POST \
            --url "http://localhost:4000/api/reset?countryCodes=UGA&resetIdentifier=ci-pipeline-test" \
            --header "Content-Type: application/json" \
            --data '{"secret":"fill_in_secret"}'

          echo "Waiting for reset to complete..."
          for i in $(seq 1 600); do
            STATUS=$(curl --silent "http://localhost:4000/api/reset/status")
            IN_PROGRESS=$(echo "$STATUS" | jq -r '.inProgress')
            ERROR=$(echo "$STATUS" | jq -r '.error')
            if [ "$IN_PROGRESS" = "false" ]; then
              if [ "$ERROR" != "null" ]; then
                echo "Reset failed: $ERROR"
                exit 1
              fi
              echo "Reset completed successfully."
              break
            fi
            sleep 1
          done

          if [ "$IN_PROGRESS" != "false" ]; then
            echo "Reset did not complete within 600 seconds."
            exit 1
          fi

      - name: Run test shard
        env:
          PYTHONFAULTHANDLER: '1'
          PYTHONUNBUFFERED: '1'
        run: uv run -m pytest pipelines/test/

      - name: Docker logs
        if: failure()
        uses: jwalton/gh-docker-logs@v2

  # This job is here to make the above jobs "required" in GitHub.
  # This is a workaround for this issue: https://github.com/orgs/community/discussions/44490
  test-shard-resolution-pipelines:
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Check required job results
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "Some checks have failed." >> $GITHUB_STEP_SUMMARY
          exit 1
      - name: Check required job results
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        run: |
          echo "All required checks have successfully passed." >> $GITHUB_STEP_SUMMARY
          exit 0
