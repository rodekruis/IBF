# See: https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions

name: 'Deploy [staging] All'

permissions:
  actions: read
  deployments: write

on:
  workflow_call:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  deploy_portal:
    name: 'Build + Deploy: Portal'
    uses: ./.github/workflows/deploy_staging_portal.yml
    secrets:
      AZURE_STATIC_WEB_APPS_API_TOKEN_PORTAL: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PORTAL }}
      APP_MAPTILER_API_KEY: ${{ secrets.APP_MAPTILER_API_KEY }}
      FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}

  deploy_service:
    name: 'Build + Deploy: api-Service'
    uses: ./.github/workflows/deploy_staging_api-service.yml
    secrets:
      AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
