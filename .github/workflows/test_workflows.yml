# See: https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions

name: 'Test: Workflows'

on:
  workflow_dispatch:
  merge_group:
    types: [checks_requested]
  pull_request:
    paths:
      - '.github/actions/**'
      - '.github/workflows/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Lint GitHub Action workflows
        id: actionlint
        continue-on-error: true
        uses: raven-actions/actionlint@v2
        with:
          group-result: false
          shellcheck: true
          pyflakes: false
          flags: '-ignore SC2086'

      - name: Lint .env files
        id: dotenv_lint
        continue-on-error: true
        uses: dotenv-linter/action-dotenv-linter@v3
        with:
          reporter: github-code-suggestions
          dotenv_linter_flags: -- --skip UnorderedKey

      - name: Fail if any check failed
        if: always()
        run: |
          if [[ "${{ steps.actionlint.outcome }}" == "failure" || "${{ steps.dotenv_lint.outcome }}" == "failure" ]]; then
            echo "One or more checks failed. See above for details."
            exit 1
          fi
