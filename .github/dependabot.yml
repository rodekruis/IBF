# See: https://docs.github.com/en/github/administering-a-repository/configuration-options-for-dependency-updates#configuration-options-for-dependabotyml
version: 2

updates:
  - directory: '/'
    package-ecosystem: 'github-actions'
    schedule:
      interval: 'monthly'

  - directory: '/'
    package-ecosystem: 'npm'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 5
    versioning-strategy: increase

  - directory: '/services/api-service'
    package-ecosystem: npm
    schedule:
      interval: monthly
      day: tuesday
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      development:
        patterns:
          - '@swc/*'
          - '@types/*'
          - '*eslint*'
          - '*prettier*'
      nestjs:
        patterns: ['@nestjs/*']
      prisma:
        patterns: ['@prisma/*', 'prisma']
    ignore:
      # Dependencies below are ordered alphabetically!
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
      - dependency-name: 'applicationinsights'
        update-types: ['version-update:semver-major']
      - dependency-name: 'bwip-js'
      - dependency-name: 'eslint-plugin-custom-rules' # Local package, no need to check
      - dependency-name: 'jimp'
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      - dependency-name: eslint # eslint v10 has conflict with eslint-plugin-eslint-comments
        update-types:
          - version-update:semver-major
      - dependency-name: '@eslint/js'
        update-types:
          - version-update:semver-major
