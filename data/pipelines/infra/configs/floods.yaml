hazard_type: floods

# Pipeline Run Configs per country

# Data sources without `run_target` are loaded for every run.
# Entries with `run_target` are loaded only for that run target
# Selected by --mock and skipped when --infra-only is set
_data_sources: &data_sources
  - source: alert_configs_ibf_api
  - source: glofas_stations_ibf_api
  - source: admin_area_ibf_api
  - source: population_seed_repo
  - source: flood_extents_seed_repo
  - source: glofas_discharge_ftp
    run_target: live # production (GloFAS FTP)
  - source: glofas_discharge_seed_repo_alert # over-threshold mock seed
    run_target: mock_alert # --mock 1
  - source: glofas_discharge_seed_repo_no_alert # under-threshold mock seed
    run_target: mock_no_alert # --mock 0

countries:
  - iso_3_code: ETH
    target_admin_level: 3
    data_sources: *data_sources
  - iso_3_code: KEN
    target_admin_level: 3
    data_sources: *data_sources
  - iso_3_code: MWI
    target_admin_level: 3
    data_sources: *data_sources
  - iso_3_code: PHL
    target_admin_level: 3
    data_sources: *data_sources
  - iso_3_code: SSD
    target_admin_level: 3
    data_sources: *data_sources
  - iso_3_code: UGA
    target_admin_level: 4
    data_sources: *data_sources
  - iso_3_code: ZMB
    target_admin_level: 3
    data_sources: *data_sources
