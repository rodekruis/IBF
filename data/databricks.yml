bundle:
  name: nrw-pipelines

# This bundle deploys the hazard pipelines, and defines what runs and when.
#
# The bundle is packaged as a Python wheel (built via `uv build --wheel`)
# and executed via the `pipeline` entry point declared in pyproject.toml.
#
# Source files (including infra/configs/*.yaml) are also synced to the
# workspace by `databricks bundle deploy`, so the YAML configs can be
# referenced via ${workspace.file_path}.
#
# Since this is a bundle file, that needs all shared Python files in it's dir scope,
# it needs to be in the data/ directory.

variables:
  notification_email:
    description: Email address to notify on job failure.
    default: ehill@redcross.nl # TODO: change this with a shared alias
  node_type_id:
    description: Azure VM type for the job cluster.
    default: Standard_DS3_v2
  spark_version:
    description: Databricks Runtime version (must include Python 3.12+).
    default: 16.4.x-scala2.12

artifacts:
  pipelines_wheel:
    type: whl
    build: uv build --wheel
    path: .

targets:
  test:
    mode: production
    workspace:
      root_path: /Workspace/nrw/test
    resources:
      jobs:
        # Jobs are paused from scheduled runs and are only triggered manually.
        nrw_drought_forecast:
          schedule:
            pause_status: PAUSED
        nrw_floods_forecast:
          schedule:
            pause_status: PAUSED
  prod:
    mode: production
    default: true
    workspace:
      root_path: /Workspace/nrw/prod

resources:
  jobs:
    nrw_drought_forecast:
      name: 'NRW - Drought forecast'
      description: 'Daily drought forecast pipeline (currently runs on test data).'
      max_concurrent_runs: 1
      timeout_seconds: 3600
      schedule:
        # Daily at 06:00 UTC.
        quartz_cron_expression: '0 0 6 * * ?'
        timezone_id: UTC
        pause_status: UNPAUSED
      email_notifications:
        on_failure:
          - ${var.notification_email}
      tasks:
        - task_key: run_drought
          job_cluster_key: nrw_cluster
          python_wheel_task:
            package_name: pipelines
            entry_point: pipeline
            parameters:
              - --config
              - ${workspace.file_path}/pipelines/infra/configs/drought.yaml
              - --run-target
              - DEBUG
          libraries:
            - whl: ./dist/*.whl
      job_clusters:
        - job_cluster_key: nrw_cluster
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            num_workers: 0
            data_security_mode: SINGLE_USER
            custom_tags:
              nrw-pipeline: drought
            spark_env_vars:
              IBF_API_URL: '{{secrets/nrw/IBF_API_URL}}'
              IBF_PIPELINE_API_KEY: '{{secrets/nrw/IBF_PIPELINE_API_KEY}}'

    nrw_floods_forecast:
      name: 'NRW - Floods forecast'
      description: 'Daily floods forecast pipeline (currently runs on test data).'
      max_concurrent_runs: 1
      timeout_seconds: 3600
      schedule:
        # Daily at 06:30 UTC (staggered from drought).
        quartz_cron_expression: '0 30 6 * * ?'
        timezone_id: UTC
        pause_status: UNPAUSED
      email_notifications:
        on_failure:
          - ${var.notification_email}
      tasks:
        - task_key: run_floods
          job_cluster_key: nrw_cluster
          python_wheel_task:
            package_name: pipelines
            entry_point: pipeline
            parameters:
              - --config
              - ${workspace.file_path}/pipelines/infra/configs/floods.yaml
              - --run-target
              - DEBUG
          libraries:
            - whl: ./dist/*.whl
      job_clusters:
        - job_cluster_key: nrw_cluster
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            num_workers: 0
            data_security_mode: SINGLE_USER
            custom_tags:
              nrw-pipeline: floods
            spark_env_vars:
              IBF_API_URL: '{{secrets/nrw/IBF_API_URL}}'
              IBF_PIPELINE_API_KEY: '{{secrets/nrw/IBF_PIPELINE_API_KEY}}'
